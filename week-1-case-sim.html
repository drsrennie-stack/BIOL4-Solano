<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,500;1,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#142940; --navy-deep:#0A1A2A; --navy-bg:#E8EDF3; --navy-bd:#B8C5D5;
  --terra:#7C2018; --terra-bg:#F5E5E2; --terra-bd:#E5BFB8;
  --gold:#C9A961; --gold-bg:#F8F1E0; --gold-bd:#E5D4A6;
  --ok:#2E5A3F; --ok-bg:#E5F0E8; --ok-bd:#B8D4C2;
  --warn:#7A5800; --warn-bg:#FAF1D8; --warn-bd:#E8D49B;
  
  --ink:#0A1A2A; --ink-soft:#3D4F5A; --ink-mute:#4A5965;
  --divider:#BFC8CD; --divider-light:#D8DEE2;
  --cream:#FAF7F2; --cream-warm:#F5F2EC; --cream-deep:#EEEAE0; --white:#FFFFFF;
  --r:8px; --rs:5px;
  --display:'Lora',Georgia,serif;
  --sans:'Plus Jakarta Sans',Arial,sans-serif;
  --body:'DM Sans',Arial,sans-serif;
  --mono:'SF Mono',Monaco,'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
*:not(input):not(textarea){user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition-duration:.01ms!important}}
@media print{body{display:none!important}}
body{font-family:var(--body);background:var(--white);color:var(--ink);min-height:100vh;font-size:17px;padding-bottom:80px;-webkit-font-smoothing:antialiased;line-height:1.6}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:2px}
.wrap{max-width:1080px;margin:0 auto;padding:1.25rem 1rem;position:relative;z-index:2}

/* Watermark */
.watermark{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;overflow:hidden;display:flex;align-items:center;justify-content:center}
.watermark-text{font-family:var(--sans);font-weight:700;font-size:72px;color:var(--navy);opacity:.05;transform:rotate(-30deg);white-space:nowrap;letter-spacing:.05em;text-align:center;line-height:1.2}

h1{font-family:var(--sans);font-weight:800;font-size:30px;letter-spacing:-.02em;line-height:1.2}
h2{font-family:var(--sans);font-size:20px;font-weight:700;color:var(--navy);margin-bottom:.5rem;letter-spacing:-.01em}
p{font-size:16.5px;color:var(--ink-soft);line-height:1.65}

button{font-family:var(--sans);font-size:15px;font-weight:600;padding:10px 20px;border:1px solid var(--divider);border-radius:var(--rs);background:var(--white);color:var(--ink);cursor:pointer;transition:all .15s}
button:hover:not(:disabled){background:var(--cream-warm);border-color:var(--ink-soft)}
button:disabled{opacity:.4;cursor:default}
button.bb{background:var(--navy);color:var(--white);border-color:var(--navy)}
button.bb:hover:not(:disabled){background:var(--navy-deep)}
button.bt{background:var(--ok);color:var(--white);border-color:var(--ok)}
button.bt:hover:not(:disabled){background:#1F4530}
button.bg{background:var(--gold);color:var(--navy-deep);border-color:var(--gold)}
button.bg:hover:not(:disabled){background:#B89545}

input[type=text],input[type=password],textarea{font-family:var(--body);font-size:17px;border:1px solid var(--divider);border-radius:var(--rs);padding:10px 12px;width:100%;background:var(--white);color:var(--ink);line-height:1.55;resize:vertical}
input:focus,textarea:focus{outline:3px solid var(--gold);outline-offset:0;border-color:var(--navy)}

.card{background:var(--white);border:1px solid var(--divider-light);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 2px rgba(20,41,64,.05),0 1px 3px rgba(20,41,64,.04)}
.badge{display:inline-block;font-family:var(--sans);font-size:13px;font-weight:700;padding:5px 13px;border-radius:13px;letter-spacing:.06em;text-transform:uppercase}
.b-navy{background:var(--navy-bg);color:var(--navy);border:1px solid var(--navy-bd)}
.b-terra{background:var(--terra-bg);color:var(--terra);border:1px solid var(--terra-bd)}
.b-gold{background:var(--gold-bg);color:var(--warn);border:1px solid var(--gold-bd)}
.b-ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.b-reveal{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}

.sl{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.sep{border:none;border-top:1px solid var(--divider-light);margin:1rem 0}
.flex{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.fb{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:300px 1fr;gap:1rem}
@media(max-width:760px){.g2{grid-template-columns:1fr}}

/* Credit bar */
.cbar{background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:var(--rs);padding:10px 14px;display:flex;align-items:center;gap:14px;margin-bottom:.875rem}
.cnum{font-family:var(--display);font-style:italic;font-weight:600;font-size:42px;color:var(--navy);line-height:1}
.clabel{font-family:var(--sans);font-size:15px;font-weight:700;color:var(--warn);letter-spacing:.04em;text-transform:uppercase}
.csub{font-size:15px;color:var(--ink-soft);line-height:1.55;margin-top:6px;font-weight:500}
.pb{height:6px;background:var(--cream-deep);border-radius:3px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;background:var(--gold);transition:width .3s}
.pf.low{background:var(--terra)} .pf.mid{background:var(--gold)}

/* Day tabs */
.day-tabs{display:flex;gap:0;border:1px solid var(--divider);border-radius:var(--rs);overflow:hidden;margin-bottom:.875rem;background:var(--cream-warm)}
.day-tab{flex:1;padding:14px 8px;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--ink-soft);text-align:center;transition:all .15s;border-right:1px solid var(--divider);line-height:1.3}
.day-tab:last-child{border-right:none}
.day-tab.active{background:var(--white);color:var(--navy)}
.day-tab.locked{color:var(--ink-mute);cursor:default}
.day-tab.unlocked{color:var(--ok)}

/* Unlock bar */
.unlock-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:var(--rs);margin-bottom:.875rem;flex-wrap:wrap}
.unlock-bar input{flex:1;min-width:140px;padding:11px 14px;font-size:16px;letter-spacing:.08em;text-transform:uppercase}

/* Items */
.fi{padding:13px 15px;border-radius:var(--rs);border:1px solid var(--divider-light);margin-bottom:7px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between;font-size:15.5px;font-weight:500}
.fi:hover{background:var(--ok-bg);border-color:var(--ok-bd)}
.fi.got{background:var(--ok-bg);border-color:var(--ok-bd)}
.oc{font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.06em;margin:16px 0 7px;padding-left:2px}
.oi{padding:13px 15px;border-radius:var(--rs);border:1px solid var(--divider-light);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .12s;font-size:15.5px;font-weight:500}
.oi:hover:not(.done){background:var(--navy-bg);border-color:var(--navy-bd)}
.oi.done{background:var(--ok-bg);border-color:var(--ok-bd);cursor:default}

/* Chat */
.chatbox{border:1px solid var(--divider-light);border-radius:var(--r);overflow:hidden;background:var(--white)}
.ci{padding:.875rem;overflow-y:auto;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.msg{max-width:78%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.ml{font-family:var(--sans);font-size:14.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.msg.user .ml{text-align:right}
.mb{padding:16px 20px;border-radius:var(--r);font-size:18px;line-height:1.65}
.msg.user .mb{background:var(--navy-bg);border:1px solid var(--navy-bd);border-bottom-right-radius:3px;color:var(--navy)}
.msg.assistant .mb{background:var(--cream-warm);border:1px solid var(--divider-light);border-bottom-left-radius:3px}
.msg.assistant.gate .mb{background:var(--gold-bg);border-color:var(--gold-bd)}
.msg.assistant.result .mb{background:var(--ok-bg);border-color:var(--ok-bd)}
.msg.assistant.fail .mb{background:var(--terra-bg);border-color:var(--terra-bd);color:var(--terra)}
.msg.assistant.patient .mb{background:var(--cream-warm);border-color:var(--terra-bd);border-left:4px solid var(--terra);font-family:var(--display);font-style:italic;color:var(--terra)}
.msg.assistant.unlock .mb{background:var(--ok-bg);border-color:var(--ok-bd)}
.ir{display:flex;gap:6px;padding:8px 10px;border-top:1px solid var(--divider-light);align-items:flex-end}
.ir textarea{flex:1;min-height:38px;max-height:80px;resize:none}

/* Result cards */
.rc{background:var(--ok-bg);border:1px solid var(--ok-bd);border-radius:var(--rs);padding:15px 18px;margin-bottom:9px;font-size:15px;line-height:1.75;white-space:pre-wrap;font-family:var(--mono)}
.rl{font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--ok);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.fc{background:var(--cream-warm);border:1px solid var(--divider-light);border-radius:var(--rs);padding:15px 18px;margin-bottom:9px;font-size:15px;line-height:1.75;white-space:pre-wrap}
.fl{font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.ar{background:var(--terra-bg);border:1px solid var(--terra-bd);border-left:4px solid var(--terra);border-radius:var(--rs);padding:15px 18px;margin-bottom:9px;font-size:15px;line-height:1.75;white-space:pre-wrap;font-family:var(--mono)}
.al{font-family:var(--sans);font-size:13.5px;font-weight:700;color:var(--terra);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}

/* Topic pills */
.tpill{font-family:var(--sans);font-size:14.5px;padding:6px 14px;border-radius:14px;font-weight:600}
.tpill.hit{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}
.tpill.miss{background:var(--cream-deep);color:var(--ink-mute);border:1px solid var(--divider-light)}

/* Score row */
.score-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--divider-light);font-size:16px}
.score-row:last-child{border-bottom:none}
.sv{font-family:var(--mono);font-weight:700}
.sv.full{color:var(--ok)} .sv.part{color:var(--warn)} .sv.zero{color:var(--terra)}
.reveal-text{background:var(--cream-warm);border:1px solid var(--divider-light);border-radius:var(--rs);padding:18px 22px;font-size:15.5px;line-height:1.85;white-space:pre-wrap;max-height:560px;overflow-y:auto}
.istep{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--divider-light);font-size:16px;line-height:1.7}
.istep:last-child{border-bottom:none}
.inum{width:32px;height:32px;border-radius:50%;background:var(--navy);color:var(--white);font-family:var(--sans);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

.note{background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:var(--rs);padding:15px 20px;font-size:15.5px;color:var(--warn);line-height:1.7;margin-bottom:1rem;font-weight:500}
.alert-terra{background:var(--terra-bg);border:1px solid var(--terra-bd);border-left:4px solid var(--terra);border-radius:var(--rs);padding:15px 20px;font-size:16px;color:var(--terra);line-height:1.65;margin-bottom:1rem;font-weight:500}

.dots{display:inline-flex;gap:4px;padding:5px 0;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--ink-mute);animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Disclaimer */
.disclaimer{position:fixed;bottom:0;left:0;right:0;background:var(--gold-bg);border-top:1px solid var(--gold-bd);padding:11px 16px;font-family:var(--sans);font-size:14px;color:var(--warn);text-align:center;z-index:9999;font-weight:500}
</style>
</head>
<body>
<div class="watermark"><div class="watermark-text" id="wmt">BIO 004 ,  Confidential</div></div>
<div class="wrap"><div id="app"></div></div>
<div class="disclaimer">⚕ Educational simulation only. All patients and clinical scenarios are entirely fictional and created for learning purposes. Not medical advice.</div>
<script>
/* ────────── COURSE / DAY / REVEAL CODES ────────── */
const COURSE_PW = "DERMIS";       // Initial access (instructor announces in Monday class)
const REVEAL_CODE = "CLEAVE";      // After Thursday TBL
const FORM_URL = "";               // Optional Google Form POST endpoint
const FORM_FIELDS = {name:"entry.1",diag:"entry.2",rationale:"entry.3",credits:"entry.4",total:"entry.5"};

/* ────────── THE CASE ────────── */
const CASE = {
  id:"BIO004-W1-PATEL", title:"Week 1 ,  Jordan Patel",
  system:"Integumentary System & Tissue Foundations",
  patient:{name:"Jordan Patel", age:24, gender:"Female"},
  cc:"Painful spreading rash, eye and mouth pain ,  started 2 days ago",
  dayCodes:{2:"NIKOLSKY", 3:"SCORTEN"},
  highYield:["nikolsky","biopsy","cbc_d1","scorten"],

  /* INTERVIEW ,  keyword-matched patient responses */
  interviewResponses:[
    /* === DRUG NAME (specific) === */
    {keys:["bactrim","sulfameth","trimethoprim","tmp-smx","tmp/smx","sulfonamide","sulfa drug"],
     r:"Yes, that is it. The pharmacy called it Bactrim. The label says sulfamethoxazole-trimethoprim."},
    {keys:["what is the name","whats the name","name of the antibiotic","name of the drug","name of the medication","what is it called","whats it called","what antibiotic","which antibiotic","what kind of antibiotic"],
     r:"Bactrim. I have the bottle in my bag if you want to see it."},
    /* === WHY PRESCRIBED === */
    {keys:["what was it for","what is it for","why prescribed","what prescribed for","why are you on","why did you start","why are you taking","what is the antibiotic for","what is the medication for","prescribed for"],
     r:"For a UTI my doctor diagnosed about 10 days ago."},
    /* === DURATION === */
    {keys:["how long have you been taking","how long have you been on","how long on it","how many days have you","when did you start taking","when did you start the antibiotic","when did you begin taking","how many days ago did you start"],
     r:"Nine days ago. I have one pill left in the bottle."},
    /* === UTI / urinary === */
    {keys:["uti","urinary tract","bladder infection","kidney infection"],
     r:"I had one my doctor treated about 10 days ago. The burning when I peed cleared up after the first few days."},
    /* === MEDICATION (general) ,  answers without giving the name or purpose === */
    {keys:["new medication","new prescription","new med","recent medication","start anything new","just started taking","new drug"],
     r:"Yes, I started one antibiotic about 9 days ago. Nothing else has changed."},
    {keys:["any medication","other medication","other med","what medications","what meds","take any med","take any medic","any prescription","taking any","taking anything","on any pill","any pills","any drugs"],
     r:"Just one antibiotic I started about 9 days ago. No other prescriptions, no supplements, no vitamins, no birth control."},
    {keys:["antibiotic"],
     r:"Yes, I am on one. I started it about 9 days ago."},
    /* === ONSET (each event answered separately) === */
    {keys:["when did the rash","when did the spots","when did the skin","when did your skin","when did the blister","skin started","rash start","rash begin","spots start","spots appear","when did the lesions"],
     r:"Yesterday morning. A burning red patch came up on my upper chest. By last night it was spreading."},
    {keys:["when did your eyes","when did the eye","eyes start","eye symptoms start"],
     r:"Two days ago. They felt gritty first. Last night light started hurting."},
    {keys:["when did your mouth","when did the mouth","mouth start","when did the lip"],
     r:"Two days ago. The inside of my lips started peeling first, then the sores came."},
    {keys:["when did the throat","when did your throat","when did sore throat","throat start"],
     r:"Four days ago. That was the first thing I noticed."},
    {keys:["when did the fever","when did you get a fever","when did your fever","when did the temperature","fever start"],
     r:"Four days ago. It was around 101. Today it spiked to 103."},
    {keys:["when did this all start","when did your symptoms start","when did this begin","first symptom","earliest symptom","how long ago did this start","how long have you had","when did everything start","when did you first feel"],
     r:"About four days ago I started feeling off. Flu-ish. The skin and eye stuff is more recent."},
    {keys:["timeline","sequence of symptoms","order of symptoms","what came first","chronology","progression of symptom"],
     r:"Sore throat and feeling flu-ish four days ago. Eyes and mouth two days ago. Skin yesterday morning. Blisters today."},
    /* === SKIN CHARACTER === */
    {keys:["where did the rash","where did the spots","where started","where on your body","what part of your body","distribution","location of the rash"],
     r:"Started on my upper chest. Now my face, neck, both upper arms. It is spreading downward."},
    {keys:["what does the rash feel","describe the pain","skin pain","painful skin","how does the rash feel","painful rash","describe the rash pain","sunburn"],
     r:"Burning, like a sunburn but stabbing. Way worse than it looks. Touching anything to it is excruciating."},
    {keys:["blister","bullae","peel","slough","skin coming off","skin sloughing"],
     r:"Yes. Some clear blisters today. The skin literally peels off when I scratch it."},
    {keys:["look like","appearance of the rash","what does it look like","describe the rash"],
     r:"Red spots, some with darker centers like a target. A few have turned into clear blisters with fluid inside."},
    /* === EYES === */
    {keys:["eye","vision","light bother","photophob","conjunctiv","red eye","eye discharge","eye symptoms"],
     r:"They feel like there is sand in them. Bright light is unbearable. Yellowish discharge in the morning."},
    /* === MOUTH === */
    {keys:["mouth","oral","lip","tongue","swallow","eating","mouth pain","mouth sore"],
     r:"Full of painful sores. I cannot really eat. Drinking water hurts. The inside of my lips is peeling and bleeds when I touch it."},
    {keys:["throat","sore throat"],
     r:"Sore. It started four days ago. Not as bad as the mouth feels now."},
    /* === GENITAL === */
    {keys:["genital","painful urination","burning when","dysuria","urethra"],
     r:"Some burning, raw feeling. I have not looked closely. I just want to lie still."},
    /* === HISTORY === */
    {keys:["allerg","drug allergy","reaction to medication","reaction to a drug","intolerance"],
     r:"No known drug allergies. I took amoxicillin once as a kid. Nothing happened. Nothing like this has ever happened to me before."},
    {keys:["past medical","medical history","chronic condition","prior illness","other condition","previous diagnos","health condition","other illness"],
     r:"Healthy. No chronic conditions. Wisdom teeth out at 18, that is it."},
    {keys:["family","mother","father","parent","sibling","relative","heredit","genetic"],
     r:"Mom has Hashimoto thyroiditis. Dad is healthy. No skin diseases or blistering disorders that I know of."},
    /* === SOCIAL === */
    {keys:["smoke","tobacco","cigarette","vape"],
     r:"I do not smoke."},
    {keys:["alcohol","drink","wine","beer","liquor"],
     r:"Glass of wine on weekends, that is all."},
    {keys:["recreational","illicit","marijuana","weed","cannabis","substance use","other substance"],
     r:"None. Just the occasional wine."},
    {keys:["sex","sexual","partner","std","sti","hiv test","stds","hiv"],
     r:"One partner, monogamous for 14 months. We use condoms. STI panel six months ago, all negative including HIV."},
    {keys:["travel","trip","abroad","vacation","out of state","traveled"],
     r:"None. I have not left the state in over a year."},
    {keys:["sun","tanning","outside","sunburn","outdoor"],
     r:"No sun exposure. It is November. I have been studying indoors."},
    {keys:["sick contact","exposure to anyone","sick person","anyone sick","sick around","contact with someone","sick exposure"],
     r:"My roommate had a cold last week. Nothing else."},
    {keys:["work","job","occupation","school","study","student","what do you do","major"],
     r:"Junior in nursing school. Just had a hard exam week."},
    /* === CONSTITUTIONAL === */
    {keys:["fever","temperature","chill","sweat","hot","feverish"],
     r:"Yes. About 101 starting four days ago. Today it spiked to 103. Alternating chills and sweats."},
    {keys:["nausea","vomit","stomach","appetite","food intake","throwing up"],
     r:"Some nausea. I have not vomited. I cannot eat because of my mouth."},
    {keys:["headache","head pain","head ache"],
     r:"Mild. The skin pain dwarfs everything else."},
    {keys:["body ache","muscle pain","joint pain","arthralgia","myalgia","achy","aching"],
     r:"My whole body has ached since this started four days ago."},
    {keys:["sleep","tired","fatigue","exhaust"],
     r:"I have not slept properly in over a day. The pain wakes me up."},
    {keys:["weight","losing weight"],
     r:"Lost about three pounds. I cannot really eat."},
    {keys:["scared","worried","afraid","anxious","panic"],
     r:"Yes. I am very scared. My mom is driving here from Sacramento."},
  ],
  interviewTopics:{
    medication:{label:"Medications",pattern:/medication|drug|pill|antibiotic|bactrim|tmp|sulfa|prescription/i},
    onset:{label:"Onset/timeline",pattern:/when|start|onset|begin|first|ago|fever/i},
    skin:{label:"Skin/rash",pattern:/rash|blister|skin|spot|peel|pain|spread/i},
    mucous:{label:"Mucous membranes",pattern:/eye|mouth|oral|lip|throat|conjunctiv|genital/i},
    history:{label:"History",pattern:/allerg|family|pmh|past medical|history|condition/i},
    social:{label:"Social hx",pattern:/work|school|smoke|drink|sexual|partner|travel/i},
  },

/* ────────── INTERVIEW MATCH ────────── */
const STOPWORDS=new Set(['the','a','an','is','are','was','were','be','been','being','have','has','had','do','does','did','my','your','his','her','its','our','their','you','he','she','we','they','this','that','these','those','can','could','would','should','will','shall','may','might','to','for','of','in','on','at','by','with','about','from','tell','please','say','give','let','know','want','any','some','what','which','who','whom','where','when','why','how']);
function stem(w){
  const tries=[['ies','y'],['ied','y'],['ing',''],['ed',''],['es',''],['ly',''],['s','']];
  for(const[sfx,rep] of tries){
    if(w.endsWith(sfx)){
      const result=w.slice(0,w.length-sfx.length)+rep;
      if(result.length>=3)return result;
    }
  }
  return w;
}
function tokenize(s){
  return s.toLowerCase()
    .replace(/[^a-z0-9 ]/g,' ')
    .split(/\s+/)
    .filter(w=>w.length>=3 && !STOPWORDS.has(w))
    .map(stem)
    .filter(w=>w.length>=3);
}
function matchInterview(text){
  // Update topic hits regardless of response found
  for(const[topic,info] of Object.entries(CASE.interviewTopics)){
    if(info.pattern.test(text)) S.iTopicHit[topic]=true;
  }
  const t=text.toLowerCase();
  const queryTokens=new Set(tokenize(text));
  if(queryTokens.size===0){
    return "Could you tell me more, in a complete sentence? I want to give you accurate information.";
  }
  let bestScore=0, bestResponse=null;
  for(const{keys,r} of CASE.interviewResponses){
    for(const k of keys){
      // Direct substring match wins instantly
      if(t.includes(k.toLowerCase())){return r;}
      const keyTokens=tokenize(k);
      if(keyTokens.length===0)continue;
      // Token overlap with query
      let matched=0;
      for(const kt of keyTokens){
        if(queryTokens.has(kt))matched++;
      }
      const score=matched/keyTokens.length;
      // Also bonus: how much of the query is "explained" by this key
      const querySize=queryTokens.size;
      const queryCoverage=querySize>0?matched/querySize:0;
      // Combined score weights key coverage more (tells if key is relevant)
      // and query coverage less (tells if response addresses the question)
      const combined=score*0.7 + queryCoverage*0.3;
      if(combined>bestScore){bestScore=combined;bestResponse=r;}
    }
  }
  // Threshold: at least 40% of a key's content tokens must overlap (or higher combined score)
  if(bestScore>=0.4)return bestResponse;
  return "I am not sure what you are asking. Could you rephrase that as a clinical question? You could ask about my symptoms, when things started, my medications, my history, or anything else.";
}

/* ────────── SCORING ────────── */
function calcScores(){
  const max={diag:35, eff:20, interview:15, gate:10, complete:5}, total_max=85;
  // Diagnostic accuracy: keyword match in diagText + rationale
  const diagPattern=/stevens.?johnson|toxic epidermal|TEN|SJS/i;
  const rationalePatterns=[/brachial|antebrachial|buccal|frontal|cervical|pectoral|sternal|trunk/i,/epitheli|stratified squamous|connective tissue|simple squamous/i,/cavity|thoracic|abdominal|pleural|cranial/i,/anterior|posterior|superficial|deep|superior|inferior|distribution/i,/bactrim|sulfa|sulfameth|sulfonamide|antibiotic/i];
  let diagPts=diagPattern.test(S.diagText)?20:0;
  diagPts+=rationalePatterns.filter(p=>p.test(S.rationaleText)).length*3;
  diagPts=Math.min(diagPts,max.diag);
  // Efficiency
  const effPts=Math.round((S.credits/S.maxCredits)*max.eff);
  // Interview
  const topicCount=Object.keys(CASE.interviewTopics).length;
  const hits=Object.values(S.iTopicHit).filter(v=>v).length;
  const intPts=Math.round((hits/topicCount)*max.interview);
  // Gate
  const gatePts=Math.max(0,max.gate-(S.retries*2));
  // Complete bonus
  const completePts=S.daysUnlocked>=3?max.complete:0;
  return{diag:diagPts,eff:effPts,interview:intPts,gate:gatePts,complete:completePts,total:diagPts+effPts+intPts+gatePts+completePts,max:total_max};
}

async function submitToForm(sc){
  if(!FORM_URL)return;
  const d=new FormData();
  d.append(FORM_FIELDS.name,S.studentName);d.append(FORM_FIELDS.diag,S.diagText);
  d.append(FORM_FIELDS.rationale,S.rationaleText);d.append(FORM_FIELDS.credits,String(S.credits));
  d.append(FORM_FIELDS.total,String(sc.total));
  try{await fetch(FORM_URL,{method:"POST",mode:"no-cors",body:d});}catch(e){}
}

function switchDay(d){S.currentDay=d;saveState();render();}
function getFree(k){if(!S.freeObtained.includes(k)){S.freeObtained.push(k);saveState();}render();}

function orderTest(id,day){
  if(S.results.find(r=>r.id===id))return;
  const order=CASE.days[day].orders.find(o=>o.id===id);
  if(!order)return;
  if(S.credits<order.cost){S.invMsgs.push({role:"assistant",cls:"fail",content:"Not enough credits to order this test."});render();return;}
  S.credits=Math.max(0,S.credits-order.cost);
  if(!S.ordered.includes(id))S.ordered.push(id);
  S.gateActive={orderId:id,order,day};
  const g=order.gate;
  const optHtml=g.opts.map(o=>`<span style="display:block;margin:6px 0;padding:6px 0;border-bottom:1px solid rgba(20,41,64,.08)">${o}</span>`).join("");
  S.invMsgs.push({role:"assistant",cls:"gate",isHtml:true,content:`<strong>Order:</strong> ${order.name} (−${order.cost} credits)<br><br><strong>⚑ ANATOMY GATE QUESTION (DOK 2-3)</strong><br><br>${g.q}<br><br>${optHtml}<br>Type the letter of your answer: <strong>A, B, C, or D</strong>`});
  saveState();render();scrollEl("inv-ci");
}

function sendInv(){
  const inp=document.getElementById("invi");
  if(!inp||!inp.value.trim())return;
  const txt=inp.value.trim();inp.value="";
  S.invMsgs.push({role:"user",content:txt});
  if(S.gateActive){
    const letter=txt.trim().toUpperCase().charAt(0);
    if(!["A","B","C","D"].includes(letter)){S.invMsgs.push({role:"assistant",cls:"gate",content:"Please type just the letter of your answer: A, B, C, or D."});render();scrollEl("inv-ci");return;}
    const{order}=S.gateActive;const g=order.gate;
    if(letter===g.correct){
      S.results.push({id:order.id,result:order.result});
      S.gateActive=null;
      S.invMsgs.push({role:"assistant",cls:"result",isHtml:true,content:`<strong>✓ CORRECT ,  ${letter} is right.</strong><br><br><strong>Explanation:</strong> ${g.exp}<br><br><strong>RESULT:</strong><br><br>${order.result.replace(/\n/g,'<br>')}`});
    } else {
      S.retries++; S.credits=Math.max(0,S.credits-15);
      S.invMsgs.push({role:"assistant",cls:"fail",isHtml:true,content:`<strong>✗ Incorrect.</strong> ${letter} is not right. (−15 credits)<br><br>Think about the anatomy. Type A, B, C, or D to retry.`});
    }
    saveState();render();scrollEl("inv-ci");return;
  }
  S.invMsgs.push({role:"assistant",content:"Click a test on the left panel to order it and receive a gate question."});
  render();scrollEl("inv-ci");
}
